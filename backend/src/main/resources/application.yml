spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sged_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: seguridad

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: seguridad

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

security:
  jwt:
    secret: ${JWT_SECRET:SGED_SUPER_SECRET_KEY_2026_SEGURA_MINIMO_32_CARACTERES}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
    issuer: ${JWT_ISSUER:sged-backend}
    audience: ${JWT_AUDIENCE:sged-frontend}
  login:
    max-intentos: ${LOGIN_MAX_INTENTOS:5}
    ventana-minutos: ${LOGIN_VENTANA_MINUTOS:15}

cache:
  estudiantes:
    ttl-seconds: ${CACHE_TTL_SECONDS:60}

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /api/swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
