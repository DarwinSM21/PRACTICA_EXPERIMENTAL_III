spring:
  application:
    name: sged-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sged_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: seguridad

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    default-schema: seguridad
    schemas: seguridad,deportivo

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

security:
  jwt:
    secret: ${JWT_SECRET:SGED_SUPER_SECRET_KEY_2026_SEGURA_MINIMO_32_CARACTERES}
    expiration-ms: 3600000
    refresh-expiration-ms: 604800000

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /api/swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics