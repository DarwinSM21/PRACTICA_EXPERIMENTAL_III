spring:
  application:
    name: sged-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sged_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate    # Prohibido update (Bloque B.1)
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: seguridad

  flyway:
    # En Docker el esquema se aplica desde db/schema.sql + db/seed.sql
    # montados en /docker-entrypoint-initdb.d (Bloque B.1); Flyway queda
    # activo solo para desarrollo local (FLYWAY_ENABLED=true).
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    default-schema: seguridad
    schemas: seguridad,deportivo

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

security:
  jwt:
    secret: ${JWT_SECRET:SGED_SUPER_SECRET_KEY_2026_SEGURA_MINIMO_32_CARACTERES}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
    issuer: ${JWT_ISSUER:sged-backend}          # claim iss (RFC 7519)
    audience: ${JWT_AUDIENCE:sged-frontend}     # claim aud (RFC 7519)
  cookie:
    secure: ${COOKIE_SECURE:true}               # HttpOnly+Secure+SameSite=Strict
  login:
    max-intentos: ${LOGIN_MAX_INTENTOS:5}       # OWASP A07: 429 desde el 6.o
    ventana-minutos: ${LOGIN_VENTANA_MINUTOS:15}

# TTL del cache Redis del listado, en configuracion externa (Bloque A.1)
cache:
  estudiantes:
    ttl-seconds: ${CACHE_TTL_SECONDS:60}

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /api/swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# OWASP A09: registro de login exitoso/fallido con ip, timestamp y sub
logging:
  file:
    name: ${LOG_FILE:logs/sged-auth.log}
  pattern:
    file: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%logger{20}] %msg%n"
