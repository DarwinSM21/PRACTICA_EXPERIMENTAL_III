# SGED - Orquestación (Entrega 3, Bloque B.1)
# Las imágenes deben quedar pinadas por digest sha256.
# Ejecute una vez:  ./scripts/pin-digests.sh   (reescribe los digests reales)
services:

  postgres:
    image: postgres:16   # PIN_DIGEST
    container_name: sged_postgres
    environment:
      POSTGRES_DB: sged_db
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Bloque B.1: esquema, seed y procedimientos aplicados por initdb
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7   # PIN_DIGEST
    container_name: sged_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sged_backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/sged_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FLYWAY_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sged_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
