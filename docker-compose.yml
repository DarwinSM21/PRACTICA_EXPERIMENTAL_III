version: '3.8'

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: sged_backend

    ports:
      - "8080:8080"

    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: sged_frontend

    ports:
      - "4200:80"

    depends_on:
      - backend

volumes:
  postgres_data: