name: CI

on:
  push:
    branches: [main, "feature/**", "docs/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sged_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changeme
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Pruebas JUnit + JaCoCo
        working-directory: backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/sged_db
          DB_USER: postgres
          DB_PASSWORD: changeme
          REDIS_HOST: localhost
        run: ./mvnw -B verify

      - name: Publicar reporte JaCoCo
        uses: actions/upload-artifact@v4
        with:
          name: jacoco
          path: backend/target/site/jacoco

      - name: Auditoría de SQL dinámico
        run: bash scripts/audit-sql-dynamic.sh

      - name: Validación de trazabilidad
        run: bash scripts/validate-traceability.sh || true  # estricto cuando exista la matriz
